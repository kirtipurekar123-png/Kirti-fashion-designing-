<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }
        body {
            background-color: #fcf8f9;
            color: #333;
        }
        header {
            background-color: #ffffff;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 3px solid #ff6699;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        header h1 {
            font-size: 2.2rem;
            color: #ff6699;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        header p {
            font-size: 1rem;
            color: #555555;
            font-style: italic;
            letter-spacing: 1px;
        }
        nav {
            margin-top: 15px;
        }
        nav a {
            text-decoration: none;
            color: #333;
            font-weight: 600;
            margin: 0 10px;
        }
        .hero {
            max-width: 90%;
            margin: 30px auto;
            padding: 30px 20px;
            background-color: #ffffff;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .hero h2 {
            color: #222;
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        .hero p {
            color: #666;
            line-height: 1.6;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Kirti's Fashion Studio</h1>
        <p>Your Style, Our Fashion</p>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h2>Welcome to Kirti's Fashion Studio</h2>
        <p>This is where we bring your dream designs to life. Custom tailoring and modern dress designing.</p>
    </section>

</body>
</html>
